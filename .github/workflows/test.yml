name: Tests & Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 fleetos --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 fleetos --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Type check with mypy
      run: |
        pip install mypy
        mypy fleetos --ignore-missing-imports || true

    - name: Test with pytest
      run: |
        pip install pytest pytest-cov
        pytest tests/ -v --cov=fleetos --cov-report=xml || true

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./coverage.xml

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Check documentation exists
      run: |
        [ -f README.md ] && echo "✓ README.md found" || exit 1
        [ -f CONTRIBUTING.md ] && echo "✓ CONTRIBUTING.md found" || exit 1
        [ -f "FleetOS_Project_Specification.docx" ] && echo "✓ Specification found" || exit 1

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install security tools
      run: |
        pip install bandit safety

    - name: Run bandit
      run: |
        bandit -r fleetos -ll || true

    - name: Check dependencies for vulnerabilities
      run: |
        safety check || true
